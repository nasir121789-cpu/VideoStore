<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🎬 VideoHub</title>

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDHmI4mXjV7ETuRrga0jJwvsOiAUvU-6C4",
      authDomain: "video-store-43e06.firebaseapp.com",
      databaseURL: "https://video-store-43e06-default-rtdb.firebaseio.com",
      projectId: "video-store-43e06",
      storageBucket: "video-store-43e06.firebasestorage.app",
      messagingSenderId: "377327952651",
      appId: "1:377327952651:web:1ee9168478d7109569b80e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let monetagLink = "";

    // Load Monetag link from Firebase
    const monetagRef = ref(db, 'settings/monetagLink');
    onValue(monetagRef, (snap) => {
      monetagLink = snap.val() || "";
    });

    // Load videos
    const videosRef = ref(db, 'videos');
    onValue(videosRef, (snap) => {
      const data = snap.val();
      const grid = document.getElementById('videoGrid');
      const loader = document.getElementById('loader');
      const empty = document.getElementById('emptyState');

      grid.innerHTML = '';
      loader.style.display = 'none';

      if (!data) {
        empty.style.display = 'flex';
        return;
      }

      empty.style.display = 'none';
      const entries = Object.entries(data).reverse();

      entries.forEach(([key, video], index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${index * 0.07}s`;
        card.innerHTML = `
          <div class="card-thumb">
            <img src="${video.imageUrl}" alt="${video.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x220/1a1a3e/9b59b6?text=🎬'"/>
            <div class="play-overlay"><span>▶</span></div>
          </div>
          <div class="card-body">
            <p class="card-title">${video.title}</p>
            <button class="watch-btn" onclick="handleWatch('${video.bloggerLink}')">
              <span>▶ Watch Now</span>
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    });

    // Expose handleWatch globally
    window.handleWatch = function(bloggerLink) {
      if (monetagLink) {
        window.open(monetagLink, '_blank');
      }
      const delay = Math.floor(Math.random() * (5000 - 3000 + 1)) + 3000;
      setTimeout(() => {
        window.location.href = bloggerLink;
      }, delay);
    };
  </script>

  <!-- Monetag In-App Interstitial -->
  <script src='//libtl.com/sdk.js' data-zone='10968541' data-sdk='show_10968541'></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap');

    :root {
      --bg-deep: #050818;
      --bg-card: #0d1230;
      --bg-card2: #101535;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --accent3: #06b6d4;
      --glow: rgba(124, 58, 237, 0.4);
      --glow2: rgba(168, 85, 247, 0.25);
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --border: rgba(124, 58, 237, 0.2);
      --radius: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(124,58,237,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 10%, rgba(6,182,212,0.08) 0%, transparent 50%);
    }

    /* ── BANNER ── */
    .banner {
      position: relative;
      background: linear-gradient(135deg, #0d1230 0%, #1a0533 50%, #0d1230 100%);
      padding: 28px 20px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }

    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 50%, rgba(124,58,237,0.3) 0%, transparent 60%),
        radial-gradient(circle at 70% 50%, rgba(6,182,212,0.15) 0%, transparent 60%);
    }

    .banner-stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 15% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 85% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 80%, rgba(255,255,255,0.4) 0%, transparent 100%);
    }

    .banner-content { position: relative; z-index: 2; }

    .banner-icon {
      font-size: 42px;
      display: block;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 16px rgba(168,85,247,0.8));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .banner-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 50%, #67e8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .banner-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    .banner-badge {
      display: inline-block;
      margin-top: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      padding: 20px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .section-header .dot {
      width: 8px; height: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      border-radius: 50%;
      box-shadow: 0 0 8px var(--glow);
      flex-shrink: 0;
    }

    .count-badge {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(124,58,237,0.15);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 12px 30px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: cardIn 0.5s ease both;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(124,58,237,0.3);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #0a0e28;
    }

    .card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .card:hover .card-thumb img { transform: scale(1.06); }

    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover .play-overlay { opacity: 1; }

    .play-overlay span {
      font-size: 28px;
      color: #fff;
      text-shadow: 0 0 20px rgba(168,85,247,0.9);
    }

    .card-body {
      padding: 10px 10px 12px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .watch-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border: none;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 700;
      padding: 8px 6px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      box-shadow: 0 3px 12px rgba(124,58,237,0.35);
    }

    .watch-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 5px 20px rgba(124,58,237,0.55);
    }

    .watch-btn:active {
      transform: scale(0.97);
    }

    /* ── LOADER ── */
    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(124,58,237,0.2);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loader p { color: var(--text-muted); font-size: 13px; }

    /* ── EMPTY STATE ── */
    #emptyState {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 12px;
      color: var(--text-muted);
      font-size: 14px;
    }

    #emptyState span { font-size: 48px; }

    /* ── REDIRECT OVERLAY ── */
    .redirect-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5,8,24,0.92);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      backdrop-filter: blur(8px);
    }

    .redirect-overlay.active { display: flex; }

    .redirect-spinner {
      width: 56px; height: 56px;
      border: 4px solid rgba(168,85,247,0.2);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .redirect-text {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      color: #c4b5fd;
      text-align: center;
    }

    .redirect-sub { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>

  <!-- Redirect Overlay -->
  <div class="redirect-overlay" id="redirectOverlay">
    <div class="redirect-spinner"></div>
    <p class="redirect-text">ভিডিও লোড হচ্ছে...</p>
    <p class="redirect-sub">একটু অপেক্ষা করুন</p>
  </div>

  <!-- Banner -->
  <div class="banner">
    <div class="banner-stars"></div>
    <div class="banner-content">
      <span class="banner-icon">🎬</span>
      <h1 class="banner-title">VideoHub</h1>
      <p class="banner-sub">আপনার পছন্দের ভিডিও একটু জায়গায়</p>
      <span class="banner-badge">✨ Latest Videos</span>
    </div>
  </div>

  <!-- Section Header -->
  <div class="section-header">
    <div class="dot"></div>
    <h2>সকল ভিডিও</h2>
    <span class="count-badge" id="countBadge">লোড হচ্ছে...</span>
  </div>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <p>ভিডিও লোড হচ্ছে...</p>
  </div>

  <!-- Empty State -->
  <div id="emptyState">
    <span>📭</span>
    <p>কোনো ভিডিও পাওয়া যায়নি</p>
  </div>

  <!-- Video Grid -->
  <div class="grid" id="videoGrid"></div>

  <!-- Monetag In-App Interstitial Init -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof show_10968541 !== 'undefined') {
        show_10968541({
          type: 'inApp',
          inAppSettings: {
            frequency: 2,
            capping: 0.1,
            interval: 30,
            timeout: 5,
            everyPage: false
          }
        });
      }
    });

    // Override handleWatch to show overlay
    const _origHandleWatch = window.handleWatch;
    window.handleWatch = function(bloggerLink) {
      document.getElementById('redirectOverlay').classList.add('active');
      _origHandleWatch && _origHandleWatch(bloggerLink);
    };

    // Update count badge
    const observer = new MutationObserver(() => {
      const count = document.getElementById('videoGrid').children.length;
      document.getElementById('countBadge').textContent = count > 0 ? `${count} টি ভিডিও` : 'খালি';
    });
    observer.observe(document.getElementById('videoGrid'), { childList: true });
  </script>

  <!-- Telegram theme sync -->
  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      Telegram.WebApp.expand();
      Telegram.WebApp.setHeaderColor('#050818');
      Telegram.WebApp.setBackgroundColor('#050818');
    }
  </script>
</body>
</html>
